services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_ENV=true
      - AUTH_TOKEN=easyfly_token_123 
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=easyfly_token_123
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgres://evolution:evolution_pass@db:5432/evolution_db
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CONFIG_SESSION_PHONE_NAME=EasyFly_Bot
      - WA_VERSION=2.3000.1037671765
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: evolution_db
    restart: always
    environment:
      - POSTGRES_DB=evolution_db
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2-alpine
    container_name: evolution_redis
    restart: always
    volumes:
      - redis_data:/data

  # --- NOVO: MOTOR DO AGENTE CLAW (NAVEGADOR) ---
  chrome:
    image: browserless/chrome:latest
    container_name: agent-claw-browser
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - TOKEN=easyfly_claw_789
      - SCREENSHOT_ENABLED=true
      - TIMEOUT=60000


volumes:
  n8n_data:
  evolution_instances:
  evolution_store:
  postgres_data:
  redis_data:
